<!DOCTYPE html>
<html lang="en">
<head>

  <title>Interactive Pepsi Card</title>

</head>
<body>

    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="circle">
      <img src="./resources/pngwing.com (1).png" alt="Cocacola Logo" class="logo">

    <img src="./resources/pngwing.com.png" alt="Cocacola Can" class="product_img">
